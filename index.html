<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FENS 2026 Program</title>
<style>
:root {
  --bg: #fafafa; --surface: #fff; --border: #e0e0e0;
  --text: #1a1a1a; --text-muted: #666; --accent: #2563eb;
  --accent-light: #dbeafe; --star: #eab308; --star-bg: #fef9c3;
  --tag-symposia: #6366f1; --tag-plenary: #ec4899; --tag-poster: #14b8a6;
  --tag-special: #f59e0b; --tag-workshop: #8b5cf6; --tag-lecture: #ef4444;
  --tag-debate: #06b6d4; --tag-network: #84cc16; --tag-ceremony: #f97316;
  --tag-timeslot: #78716c;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --text-muted: #94a3b8; --accent: #60a5fa;
    --accent-light: #1e3a5f; --star-bg: #422006;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  padding: 16px; max-width: 960px; margin: 0 auto;
}
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab {
  padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; font-size: 0.9rem; font-weight: 600;
  background: var(--surface); color: var(--text-muted); transition: all .15s;
}
.tab:hover { border-color: var(--accent); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-box {
  flex: 1; min-width: 200px; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; background: var(--surface); color: var(--text);
}
.search-box:focus { outline: none; border-color: var(--accent); }
.star-filter {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 0.85rem; background: var(--surface); user-select: none; white-space: nowrap;
}
.star-filter.active { border-color: var(--star); background: var(--star-bg); }
.share-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; background: var(--surface);
  color: var(--text); user-select: none; white-space: nowrap;
}
.share-btn:hover { border-color: var(--accent); }
.share-btn:active { background: var(--accent-light); }
.stats { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 12px; }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 12px; overflow: hidden;
}
.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; cursor: pointer; user-select: none; transition: background .15s;
  border-bottom:1px solid var(--border);
}
.card-header:hover { background: var(--accent-light); }
.card-header .arrow {
  flex-shrink: 0; transition: transform .2s; font-size: 0.8rem; color: var(--text-muted);
}
.card-header .arrow.open { transform: rotate(90deg); }
.card-header .title { flex: 1; font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
.card-header .meta { font-size: 0.8rem; color: var(--text-muted); }
.card-header .star-btn { font-size: 1rem; padding:2px; opacity:0.4; }
.card-header .star-btn.active { opacity:1; }
.card-body { padding: 0 16px 16px; display: none; }
.card-body.open { display: block; }

/* Star btn — placed OUTSIDE toggle headers */
.star-btn {
  flex-shrink: 0; cursor: pointer; font-size: 1.2rem; line-height: 1;
  opacity: 0.3; transition: all .15s; background: none; border: none; padding: 4px 6px;
}
.star-btn:hover { opacity: 0.7; transform: scale(1.2); }
.star-btn.active { opacity: 1; color: var(--star); }

/* Timeslot group insider header */
.ts-header {
  display: flex; align-items: center; gap: 8px; padding: 12px 16px;
  border-bottom: none;
}
.ts-header .title { flex: 1; font-size: 0.95rem; font-weight: 700; }
.ts-header .meta { font-size: 0.85rem; color: var(--text-muted); }

/* Nested poster sessions inside a timeslot */
.nested-card {
  border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; overflow: hidden;
}
.nested-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; cursor: pointer; user-select: none; transition: background .15s;
}
.nested-header:hover { background: var(--accent-light); }
.nested-header .arrow {
  flex-shrink: 0; transition: transform .2s; font-size: 0.7rem; color: var(--text-muted);
}
.nested-header .arrow.open { transform: rotate(90deg); }
.nested-header .title { flex: 1; font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
.nested-header .meta { font-size: 0.75rem; color: var(--text-muted); }
.nested-body { padding: 0 12px 8px; display: none; }
.nested-body.open { display: block; }

/* Tags */
.tag {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; color: #fff; flex-shrink: 0;
}
.tag-symposia { background: var(--tag-symposia); }
.tag-plenary { background: var(--tag-plenary); }
.tag-poster { background: var(--tag-poster); }
.tag-special { background: var(--tag-special); }
.tag-workshop { background: var(--tag-workshop); }
.tag-lecture { background: var(--tag-lecture); }
.tag-debate { background: var(--tag-debate); }
.tag-network { background: var(--tag-network); }
.tag-ceremony { background: var(--tag-ceremony); }
.tag-timeslot { background: var(--tag-timeslot); }
.tag-other { background: var(--text-muted); }
.tag-now { background: #16a34a; }
.tag-clash { background: #dc2626; }

/* Day headings shown in global (search / agenda) mode */
.day-heading {
  font-size: 1rem; font-weight: 700; margin: 20px 0 10px;
  padding-bottom: 4px; border-bottom: 2px solid var(--border);
}
.day-heading:first-child { margin-top: 4px; }
.today-pill {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
  background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 10px;
  vertical-align: middle; margin-left: 6px;
}
/* "Happening now" cards get a green accent edge */
.card.now { border-color: #16a34a; box-shadow: inset 3px 0 0 #16a34a; }
.tab.today { border-color: var(--accent); }

/* Back-to-top floating button */
#toTop {
  position: fixed; right: 16px; bottom: 16px; z-index: 900;
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 1.2rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none; align-items: center; justify-content: center;
}
#toTop.show { display: flex; }

/* Talks */
.chairs { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
.talk {
  padding: 6px 8px; margin: 2px 0; border-radius: 6px;
  display: flex; align-items: flex-start; gap: 6px; transition: background .15s;
}
.talk:hover { background: var(--accent-light); }
.talk.starred { background: var(--star-bg); }
.talk-time {
  flex-shrink: 0; font-size: 0.8rem; color: var(--text-muted);
  font-family: monospace; min-width: 90px;
}
.talk-content { flex: 1; min-width: 0; }
.talk-title { font-size: 0.85rem; font-weight: 600; }
.talk-speaker { font-size: 0.82rem; color: var(--text-muted); }
.card-header .meta-sep { color: var(--text-muted); }

/* Posters */
.poster-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 4px; border-radius: 6px; transition: background .15s;
}
.poster-item:hover { background: var(--accent-light); }
.poster-item.starred { background: var(--star-bg); }
.poster-id {
  flex-shrink: 0; font-size: 0.75rem; color: var(--text-muted);
  font-family: monospace; min-width: 115px;
}
.poster-info { flex: 1; min-width: 0; }
.poster-title { font-size: 0.85rem; font-weight: 500; }
.poster-presenter { font-size: 0.8rem; color: var(--text-muted); }
.poster-item .star-btn, .talk .star-btn { font-size: 1rem; padding: 2px 4px; }

.highlight { background: #fde68a; border-radius: 2px; padding: 0 2px; }
@media (prefers-color-scheme: dark) { .highlight { background: #78350f; } }
.loading { text-align: center; padding: 40px; color: var(--text-muted); }

@media (max-width: 600px) {
  body { padding: 8px; }
  .card-header { flex-direction: column; align-items: flex-start; }
  .card-header .tag { margin-top: 2px; margin-bottom: 1px; }
  .card-header .meta { order: 3; }
  .card-header .meta-time, .card-header .meta-location { display: block; font-size: 0.75rem; line-height: 1.4; }
  .card-header .meta-sep { display: none; }
  .card-header .title { width: 100%; order: 4; }
  .card-header .star-btn { order: 5; align-self: flex-end; }
  .poster-id { min-width: 85px; }
  .talk-time { min-width: 70px; }
  .controls { flex-direction: column; }
  .search-box { min-width: 100%; }
  .star-filter, .share-btn { width: 100%; justify-content: center; }
  .nested-header .tag-poster { display: none; }
  .poster-item { flex-wrap: wrap; }
  .poster-item .poster-id { order: 1; flex: 1; min-width: 0; }
  .poster-item .star-btn { order: 2; margin-left: auto; }
  .poster-item .poster-info { order: 3; flex-basis: 100%; }
}
</style>
</head>
<body>
<h1>FENS 2026</h1>
<div class="subtitle" id="subtitle">Loading program...</div>
<div class="tabs" id="tabs"></div>
<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="Search titles, authors, cities, poster IDs...">
  <label class="star-filter" id="starFilter">&#9733; Starred only</label>
  <button class="share-btn" id="shareBtn" type="button">&#8682; Share</button>
  <button class="share-btn" id="shareLinkBtn" type="button">&#128279; Share link</button>
</div>
<div class="stats" id="stats"></div>
<div id="content"></div>
<button id="toTop" type="button" title="Back to top">&#8593;</button>

<script>
const LS_STARS='fens2026_stars';
let data=null;
let curDay=0;

// Cache the stars map in memory. Reading localStorage + JSON.parse on every one
// of the 5000+ starred() calls per render was a real perf problem on mobile.
var _stars=null;
function stars(){
  if(_stars===null){
    try{_stars=JSON.parse(localStorage.getItem(LS_STARS)||'{}')||{};}
    catch(e){_stars={};}
  }
  return _stars;
}
function saveStars(s){
  _stars=s;
  try{localStorage.setItem(LS_STARS,JSON.stringify(s));}
  catch(e){/* storage disabled/full (e.g. private mode) — keep in-memory copy */}
}
function starred(k){return !!stars()[k];}

// Tracks which groups are manually open/closed — persisted across render().
// Keys match data-toggle attribute values (e.g. "evt-...", "sess-...", "ts-...").
var openStates={};

function toggleBody(el){
  var tg=el.closest('[data-toggle]');
  if(!tg)return;
  var key=tg.getAttribute('data-toggle');
  var card=tg.closest('.card');
  var body=card?card.querySelector('.card-body'):null;
  var nestedCard=tg.closest('.nested-card');
  if(nestedCard)body=nestedCard.querySelector('.nested-body');
  var arrow=tg.querySelector('.arrow');
  if(body){
    var now=body.classList.toggle('open');
    if(arrow)arrow.classList.toggle('open',now);
    openStates[key]=now;
  }
}

function toggleStar(k,btn){
  var s=stars();
  var active;
  if(s[k]){delete s[k];active=false;}else{s[k]=true;active=true;}
  saveStars(s);
  updateStarCount();
  // When the "starred only" filter is on, un/starring changes what's visible,
  // so a full re-render is required. Otherwise update in place — avoids the
  // scroll-jump + slow rebuild that made saving look broken on mobile.
  if(document.getElementById('starFilter').classList.contains('active')){render();return;}
  if(btn){
    btn.classList.toggle('active',active);
    var item=btn.closest('.poster-item,.talk');
    if(item)item.classList.toggle('starred',active);
  }
}

function esc(s){
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
// esc() does NOT escape quotes, so it is unsafe for attribute values.
// Use escAttr() for anything placed inside a double-quoted HTML attribute.
function escAttr(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hlight(t,q){
  if(!q)return esc(t);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(t).replace(re,'<mark class="highlight">$1</mark>');
}
function mq(t,q){return !q||(t&&t.toLowerCase().includes(q.toLowerCase()))}
function parseSession(s){
  var m=s.match(/^Poster Session (\d+) - (.+)$/);
  return m?{num:m[1],theme:m[2]}:null;
}

function tagHtml(cls){return '<span class="tag tag-'+cls+'">'+cls+'</span>'}
function toTitleCase(s){
  if(!s)return s;
  var small=/^(a|an|the|and|but|or|for|nor|on|at|to|by|with|of|in|from)$/i;
  return s.toLowerCase().split(/\s+/).map(function(w,i,arr){
    if(i>0&&i<arr.length-1&&small.test(w))return w;
    return w.charAt(0).toUpperCase()+w.slice(1);
  }).join(' ');
}
function arrowHtml(open){return '<span class="arrow'+(open?' open':'')+'" onclick="toggleBody(this)">&#9654;</span>'}
function starHtml(k,active){
  return '<button class="star-btn'+(active?' active':'')+'" data-star="'+escAttr(k)+'" onclick="toggleStar(this.getAttribute(\'data-star\'),this)">&#9733;</button>';
}

// Parse "HH:MM - HH:MM" into {start,end} minutes-since-midnight.
function parseTimeRange(t){
  if(!t)return null;
  var m=String(t).match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
  if(!m)return null;
  return {start:(+m[1])*60+(+m[2]), end:(+m[3])*60+(+m[4])};
}
function nowInRange(t,nowMin){
  if(nowMin<0)return false;
  var tr=parseTimeRange(t);
  return !!tr && nowMin>=tr.start && nowMin<tr.end;
}
// Match the device's current date against the program days (for "today"/"now").
var MONTHS=['January','February','March','April','May','June','July','August',
  'September','October','November','December'];
function todayLabel(){
  var n=new Date();
  return MONTHS[n.getMonth()]+' '+n.getDate()+', '+n.getFullYear();
}
function nowMinutes(){var n=new Date();return n.getHours()*60+n.getMinutes();}
// A time range with start==end (e.g. "19:00 - 19:00") is a degenerate placeholder
// (common on networking-event speaker lists) — treat its time as absent.
function zeroDurTime(t){var tr=parseTimeRange(t);return !!tr&&tr.start===tr.end;}
// The parser leaks section headers ("Speakers", "Programme") in as talks with no
// speaker — filter them out of talk lists and the share export.
function isJunkTalk(t){return !t.speaker&&(t.title==='Speakers'||t.title==='Programme'||t.title==='Panelists');}
function eventTypeClass(ev){
  var m={'Scientific Symposia (S)':'symposia','Plenary Lecture (PL)':'plenary',
    'Special Interest Events (SiE)':'special','Technical Workshop (W)':'workshop',
    'Special Lecture (SL)':'lecture','Brain Debate':'debate','Opening Ceremony':'ceremony',
    'Networking Events (NE)':'network'};
  return m[ev.type]||'other';
}
function updateStarCount(){
  var el=document.getElementById('starFilter');
  if(!el)return;
  var n=Object.keys(stars()).length;
  el.innerHTML='&#9733; Starred'+(n?' ('+n+')':'');
}
// Among starred non-poster events, find those whose times overlap another
// starred event on the same day \u2014 the "I double-booked myself" signal.
function computeConflicts(){
  var s=stars(), set={};
  for(var di=0;di<data.days.length;di++){
    var evs=[], day=data.days[di];
    for(var ei=0;ei<day.events.length;ei++){
      var ev=day.events[ei];
      if(ev.posters||!s['evt::'+ev.sid])continue;
      var tr=parseTimeRange(ev.time);
      if(tr)evs.push({sid:ev.sid,tr:tr});
    }
    for(var a=0;a<evs.length;a++)for(var b=a+1;b<evs.length;b++){
      if(evs[a].tr.start<evs[b].tr.end && evs[b].tr.start<evs[a].tr.end){
        set[evs[a].sid]=true; set[evs[b].sid]=true;
      }
    }
  }
  return set;
}

// Render a single day's events. Returns {h, visE, visP, totalP} rather than
// touching the DOM, so render() can compose one day (browsing) or all days
// (global search / agenda) with the same code.
function renderDay(day, ctx){
  var q=ctx.q, onlyStarred=ctx.onlyStarred, isSearch=ctx.isSearch;
  var conflictSids=ctx.conflictSids||{}, nowMin=(ctx.nowMin==null?-1:ctx.nowMin);

  // Separate poster sessions and non-poster events
  var posterEvs=[];
  var otherEvs=[];
  for(var i=0;i<day.events.length;i++){
    if(day.events[i].posters) posterEvs.push(day.events[i]);
    else otherEvs.push(day.events[i]);
  }

  // Group poster sessions by time slot
  var groups={};
  for(var i=0;i<posterEvs.length;i++){
    var ev=posterEvs[i];
    var t=ev.time||'';
    if(!groups[t]) groups[t]={time:t,sessions:[]};
    groups[t].sessions.push(ev);
  }
  var timeslots=Object.keys(groups).sort();

  var totalP=0,visP=0,visE=0;
  var h='';

  // --- Poster time slot groups ---
  for(var ti=0;ti<timeslots.length;ti++){
    var ts=timeslots[ti];
    var grp=groups[ts];
    var grpKey='timeslot::'+day.date+'::'+ts;
    var grpStarred=starred(grpKey);

    // Filter sessions within this timeslot
    var visSess=[];
    for(var si=0;si<grp.sessions.length;si++){
      var sess=grp.sessions[si];
      var sessKey='evt::'+sess.sid;
      var sessStarred=starred(sessKey);
      var ps=parseSession(sess.session_name);
      var sessTitle=ps?ps.theme:sess.session_name;

      var mp=[];
      var sessMatch=q&&mq(sessTitle,q);
      for(var pi=0;pi<sess.posters.length;pi++){
        var p=sess.posters[pi];
        var pk='poster::'+p.id;
        totalP++;
        if(onlyStarred&&!grpStarred&&!sessStarred&&!starred(pk))continue;
        if(!sessMatch && q&&!mq(p.title,q)&&!mq(p.presenter,q)&&!mq(p.id,q)&&!mq(p.location,q))continue;
        mp.push(p);
      }

      if(mp.length===0 && (onlyStarred||isSearch))continue;
      visSess.push({sess:sess,sessStarred:sessStarred,mp:mp,sessTitle:sessTitle});
    }

    if(onlyStarred&&!grpStarred&&visSess.length===0)continue;
    visE++;

    // Collect session numbers for the time block label
    var sessNums=[];
    for(var si=0;si<visSess.length;si++){
      var ps=parseSession(visSess[si].sess.session_name);
      if(ps&&sessNums.indexOf(ps.num)<0)sessNums.push(ps.num);
    }
    sessNums.sort();
    var slotLabel=ts.indexOf('09:30')>=0?'Morning Posters':'Afternoon Posters';
    if(sessNums.length>0)slotLabel+=' Session '+sessNums.join(', ');

    // Render timeslot group
    var anySessOpen=false;
    for(var si=0;si<visSess.length;si++){
      var v=visSess[si];
      var sk='sess-'+v.sess.sid;
      if(openStates[sk]||(isSearch&&v.mp.length>0)||(onlyStarred&&v.mp.length>0)){
        anySessOpen=true;break;
      }
    }
    var grpOpen=openStates[grpKey]||anySessOpen;
    var tsNow=nowInRange(ts,nowMin);

    h+='<div class="card'+(tsNow?' now':'')+'">';
    // Timeslot header — clicking toggles entire group
    h+='<div class="card-header" data-toggle="ts-'+esc(day.date)+'-'+esc(ts)+'">';
    h+=arrowHtml(grpOpen);
    h+=tagHtml('poster');
    if(tsNow)h+='<span class="tag tag-now">&#9679; Now</span>';
    h+='<span class="title" onclick="toggleBody(this)">'+slotLabel+'</span>';
    h+='<span class="meta">'+esc(ts)+'</span>';
    h+='</div>';

    h+='<div class="card-body'+(grpOpen?' open':'')+'">';
    h+='<div style="padding:4px 0">';
    for(var si=0;si<visSess.length;si++){
      var v=visSess[si];
      var sess=v.sess;
      var sessKey='evt::'+sess.sid;
      var sessStarred=v.sessStarred;
      var mp=v.mp;

      var sk='sess-'+sess.sid;
      var sessOpen=openStates[sk]||(isSearch&&mp.length>0)||(onlyStarred&&mp.length>0);
      var sessTitle=v.sessTitle;
      h+='<div class="nested-card">';
      h+='<div class="nested-header" data-toggle="sess-'+sess.sid+'">';
      h+=arrowHtml(sessOpen);
      h+='<span class="title" onclick="toggleBody(this)">'+esc(sessTitle)+'</span>';
      h+='<span class="meta">'+mp.length+' posters</span>';
      h+=starHtml(sessKey,sessStarred);
      h+='</div>';

      h+='<div class="nested-body'+(sessOpen?' open':'')+'">';
      for(var pi=0;pi<mp.length;pi++){
        var p=mp[pi];
        var pk='poster::'+p.id;
        var pStar=starred(pk);
        visP++;
        h+='<div class="poster-item'+(pStar?' starred':'')+'">';
        h+='<span class="poster-id">'+esc(p.id)+'</span>';
        h+='<div class="poster-info"><div class="poster-title">'+hlight(toTitleCase(p.title),q)+'</div>';
        h+='<div class="poster-presenter">'+hlight(p.presenter,q);
        if(p.location)h+=' ('+hlight(p.location,q)+')';
        h+='</div></div>';
        h+=starHtml(pk,pStar);
        h+='</div>';
      }
      if(mp.length===0){
        h+='<div style="color:var(--text-muted);font-size:0.85rem;padding:8px">No matching posters</div>';
      }
      h+='</div></div>';
    }
    h+='</div></div></div>';
  }

  // --- Non-poster events (grouped by time to show parallel events) ---
  function renderEvent(ev, hideTag){
    var evKey='evt::'+ev.sid;
    var evStarred=starred(evKey);
    var mt=[];
    for(var ti=0;ti<(ev.talks||[]).length;ti++){
      var t=ev.talks[ti];
      if(isJunkTalk(t))continue;
      var tk='talk::'+t.sid;
      if(onlyStarred&&!evStarred&&!starred(tk))continue;
      if(q&&!mq(t.title||'',q)&&!mq(t.speaker||'',q)&&!mq(t.location||'',q))continue;
      mt.push(t);
    }
    if(mt.length===0 && (onlyStarred||isSearch))return '';
    var isOpen=openStates['evt-'+ev.sid]||(isSearch&&mt.length>0)||(onlyStarred&&mt.length>0);

    var typeClass=eventTypeClass(ev);
    var evNow=nowInRange(ev.time,nowMin);
    var evClash=!!conflictSids[ev.sid];

    var r='<div class="card'+(evNow?' now':'')+'">';
    r+='<div class="card-header" data-toggle="evt-'+ev.sid+'">';
    r+=arrowHtml(isOpen);
    if(!hideTag)r+=tagHtml(typeClass);
    if(evNow)r+='<span class="tag tag-now">&#9679; Now</span>';
    if(evClash)r+='<span class="tag tag-clash">&#9888; Clash</span>';
    r+='<span class="title" onclick="toggleBody(this)">'+esc(ev.title)+'</span>';
    r+='<span class="meta">';
    if(ev.time) r+='<span class="meta-time">'+esc(ev.time)+'</span>';
    if(ev.time&&ev.location) r+='<span class="meta-sep"> · </span>';
    if(ev.location) r+='<span class="meta-location">'+esc(ev.location)+'</span>';
    r+='</span>';
    r+=starHtml(evKey,evStarred);
    r+='</div>';

    r+='<div class="card-body'+(isOpen?' open':'')+'">';
    if(ev.chairs&&ev.chairs.length>0){
      r+='<div class="chairs">Chairs: '+ev.chairs.map(function(c){return esc(c);}).join(', ')+'</div>';
    }
    function renderTalk(t){
      var tk='talk::'+t.sid;
      var tStar=starred(tk);
      var showTime=t.time&&!zeroDurTime(t.time);
      var s='<div class="talk'+(tStar?' starred':'')+'">';
      s+='<span class="talk-time">'+(showTime?esc(t.time):'')+'</span>';
      s+='<div class="talk-content">';
      // Title first, speaker below — reads better for symposia and lectures.
      if(t.title)s+='<div class="talk-title">'+hlight(t.title,q)+'</div>';
      if(t.speaker)s+='<div class="talk-speaker">'+hlight(t.speaker,q)+(t.location?' <span style="color:var(--text-muted);font-weight:400">('+hlight(t.location,q)+')</span>':'')+'</div>';
      if(!t.speaker&&!t.title)s+='<div style="color:var(--text-muted)">(no details)</div>';
      s+='</div>';
      s+=starHtml(tk,tStar);
      s+='</div>';
      return s;
    }
    var shown=(mt.length>0?mt:(ev.talks||[])).filter(function(t){return !isJunkTalk(t);});
    if(shown.length){
      // Group talks by time to detect genuinely parallel ones. Degenerate
      // zero-duration times (networking speaker lists) are NOT parallel — render
      // them as a plain list instead of a misleading "Parallel" box.
      var tgroups=[], tgmap={};
      for(var ti=0;ti<shown.length;ti++){
        var t=shown[ti];
        if(onlyStarred&&!evStarred&&mt.length>0&&mt.indexOf(t)<0)continue;
        var tm=t.time||'';
        if(!tgmap[tm]){tgmap[tm]={time:tm,talks:[]};tgroups.push(tgmap[tm]);}
        tgmap[tm].talks.push(t);
      }
      for(var gi=0;gi<tgroups.length;gi++){
        var grp=tgroups[gi];
        if(grp.talks.length===1||zeroDurTime(grp.time)){
          for(var ti2=0;ti2<grp.talks.length;ti2++)r+=renderTalk(grp.talks[ti2]);
        }else{
          r+='<div style="margin:6px 0;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:var(--accent-light)">';
          r+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:0.8rem;color:var(--text-muted)">';
          r+='<span style="font-weight:600">&#8646; Parallel</span>';
          r+='<span style="font-family:monospace">'+esc(grp.time)+'</span>';
          r+='</div>';
          for(var ti2=0;ti2<grp.talks.length;ti2++){
            r+=renderTalk(grp.talks[ti2]);
          }
          r+='</div>';
        }
      }
    }else{
      r+='<div style="color:var(--text-muted);font-size:0.85rem">No scheduled talks</div>';
    }
    r+='</div></div>';
    return r;
  }

  // Group otherEvs by time, skipping invisible events
  var evGroups=[], evGmap={};
  for(var i=0;i<otherEvs.length;i++){
    var ev=otherEvs[i];
    var tm=ev.time||'';
    if(!evGmap[tm]){evGmap[tm]={time:tm,events:[]};evGroups.push(evGmap[tm]);}
    evGmap[tm].events.push(ev);
  }
  for(var gi=0;gi<evGroups.length;gi++){
    var grp=evGroups[gi];
    // First pass: which events in this time slot are actually visible.
    var vis=[];
    for(var ei=0;ei<grp.events.length;ei++){
      if(renderEvent(grp.events[ei],false)!=='')vis.push(grp.events[ei]);
    }
    if(vis.length===0)continue;
    visE+=vis.length;
    if(vis.length===1){
      h+=renderEvent(vis[0],false);
      continue;
    }
    // Multiple parallel events: if they're all the same type, show the type tag
    // once on the group header instead of repeating it on every card.
    var types={};
    for(var ei=0;ei<vis.length;ei++)types[eventTypeClass(vis[ei])]=1;
    var typeKeys=Object.keys(types);
    var hideTag=typeKeys.length===1;
    h+='<div style="margin:0 0 16px;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:var(--accent-light)">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:0.8rem;color:var(--text-muted)">';
    h+='<span style="font-weight:600">&#8646; Parallel sessions</span>';
    h+='<span style="font-family:monospace">'+esc(grp.time)+'</span>';
    if(hideTag)h+=tagHtml(typeKeys[0]);
    h+='</div>';
    for(var ei=0;ei<vis.length;ei++){
      h+=renderEvent(vis[ei],hideTag);
    }
    h+='</div>';
  }

  return {h:h, visE:visE, visP:visP, totalP:totalP};
}

function render(){
  if(!data)return;
  var q=document.getElementById('search').value.trim();
  var starEl=document.getElementById('starFilter');
  var onlyStarred=starEl.classList.contains('active');
  var isSearch=!!q;
  // Search and "starred only" both go global \u2014 spanning all days \u2014 because at a
  // conference you look people/topics up across the whole week, and your agenda
  // is not confined to one tab. Plain browsing stays on the selected day.
  var globalMode=isSearch||onlyStarred;
  var tLabel=todayLabel();
  var nMin=nowMinutes();
  var conflictSids=computeConflicts();

  var daysToRender=globalMode?data.days:[data.days[curDay]];
  var totalP=0,visP=0,visE=0,shownDays=0,h='';
  for(var di=0;di<daysToRender.length;di++){
    var day=daysToRender[di];
    var isToday=day.date===tLabel;
    var res=renderDay(day,{q:q,onlyStarred:onlyStarred,isSearch:isSearch,
      conflictSids:conflictSids,nowMin:isToday?nMin:-1});
    totalP+=res.totalP; visP+=res.visP; visE+=res.visE;
    if(globalMode){
      if(res.visE===0)continue; // hide days with nothing to show
      var realIdx=data.days.indexOf(day);
      h+='<h2 class="day-heading" id="day-'+realIdx+'">'+esc(day.day)+' \u00b7 '+esc(day.date)
        +(isToday?' <span class="today-pill">TODAY</span>':'')+'</h2>';
      shownDays++;
    }
    h+=res.h;
  }

  if(visE===0){
    h='<div style="text-align:center;padding:40px;color:var(--text-muted)">'
      +(onlyStarred?'Nothing starred yet. Tap the \u2605 next to talks, posters or sessions.':'No items match your search.')
      +'</div>';
  }

  // Subtitle + stats reflect the active mode.
  var sub;
  if(isSearch)sub='Search results for \u201c'+q+'\u201d'+(onlyStarred?' (starred)':'');
  else if(onlyStarred)sub='My agenda \u00b7 all days';
  else{var d0=data.days[curDay];sub=d0.date+' \u2014 '+d0.day;}
  document.getElementById('subtitle').textContent=sub;

  updateStarCount();
  document.getElementById('stats').textContent=
    (globalMode?shownDays+' days \u00b7 ':'')+visE+' blocks \u00b7 '+visP+' posters (of '+totalP+')';

  document.getElementById('content').innerHTML=h;
  toggleBackToTop();
}



// --- Share: build a plaintext printout of the starred program ---
function shortType(t){
  var m={ScientificSymposia:'Symposium',PosterSession:'Posters',PlenaryLecture:'Plenary',
    SpecialInterestEvents:'Special Interest',TechnicalWorkshop:'Workshop',SpecialLecture:'Lecture',
    BrainDebate:'Debate',OpeningCeremony:'Ceremony',NetworkingEvents:'Networking'};
  return m[t]||(t||'Event');
}
function buildStarredText(){
  if(!data)return '';
  var s=stars();
  var out=[];
  for(var di=0;di<data.days.length;di++){
    var day=data.days[di];
    var dayLines=[];
    for(var ei=0;ei<day.events.length;ei++){
      var ev=day.events[ei];
      if(ev.posters){
        var sessStar=!!s['evt::'+ev.sid];
        var tsStar=!!s['timeslot::'+day.date+'::'+(ev.time||'')];
        var picked=[];
        for(var pi=0;pi<ev.posters.length;pi++){
          var p=ev.posters[pi];
          if(sessStar||tsStar||s['poster::'+p.id])picked.push(p);
        }
        if(picked.length){
          dayLines.push('* '+(ev.session_name||'Poster Session')+'  ['+(ev.time||'')+']');
          for(var pi=0;pi<picked.length;pi++){
            var p=picked[pi];
            dayLines.push('   - '+p.id+'  '+toTitleCase(p.title)
              +(p.presenter?' — '+p.presenter:'')+(p.location?' ('+p.location+')':''));
          }
        }
      }else{
        var evStar=!!s['evt::'+ev.sid];
        var picked=[];
        for(var ti=0;ti<(ev.talks||[]).length;ti++){
          var t=ev.talks[ti];
          if(isJunkTalk(t))continue;
          if(evStar||s['talk::'+t.sid])picked.push(t);
        }
        if(evStar||picked.length){
          dayLines.push('* '+(ev.title||shortType(ev.type))
            +'  ['+(ev.time||'')+(ev.location?', '+ev.location:'')+']');
          for(var ti=0;ti<picked.length;ti++){
            var t=picked[ti];
            var tt=(t.time&&!zeroDurTime(t.time))?t.time+'  ':'';
            dayLines.push('   - '+tt+(t.title||'')
              +(t.speaker?(t.title?' — ':'')+t.speaker:'')+(t.location?' ('+t.location+')':''));
          }
        }
      }
    }
    if(dayLines.length){
      out.push(day.day+', '+day.date);
      out.push.apply(out,dayLines);
      out.push('');
    }
  }
  if(!out.length)return '';
  return 'FENS 2026 — My program\n\n'+out.join('\n').replace(/\n+$/,'')+'\n';
}

function showShareFallback(text){
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;'
    +'display:flex;align-items:center;justify-content:center;padding:16px;';
  var box=document.createElement('div');
  box.style.cssText='background:var(--surface);color:var(--text);border-radius:12px;'
    +'padding:16px;max-width:560px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:10px;';
  var ta=document.createElement('textarea');
  ta.value=text;ta.readOnly=true;
  ta.style.cssText='flex:1;min-height:240px;width:100%;font-family:monospace;font-size:0.8rem;'
    +'padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);';
  var row=document.createElement('div');
  row.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
  var copy=document.createElement('button');
  copy.textContent='Copy';copy.className='share-btn';
  copy.onclick=function(){ta.select();try{document.execCommand('copy');copy.textContent='Copied!';}catch(e){}};
  var close=document.createElement('button');
  close.textContent='Close';close.className='share-btn';
  close.onclick=function(){document.body.removeChild(wrap);};
  row.appendChild(copy);row.appendChild(close);
  box.appendChild(ta);box.appendChild(row);wrap.appendChild(box);
  wrap.onclick=function(e){if(e.target===wrap)document.body.removeChild(wrap);};
  document.body.appendChild(wrap);
  ta.focus();ta.select();
}

async function shareStarred(){
  var text=buildStarredText();
  if(!text){alert('You have not starred anything yet.\nTap the ★ next to talks, posters or sessions first.');return;}
  if(navigator.share){
    try{await navigator.share({title:'FENS 2026 — My program',text:text});return;}
    catch(e){if(e&&e.name==='AbortError')return;/* else fall through to fallback */}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    try{await navigator.clipboard.writeText(text);alert('Program copied to clipboard.');return;}
    catch(e){/* fall through */}
  }
  showShareFallback(text);
}

// --- Share link: encode the starred keys into a URL hash so it can be sent to
// someone else, who is then offered to merge them into their own saved stars. ---
// Encoding: JSON array of star keys -> UTF-8-safe base64 (URL-safe variant).
function b64urlEncode(str){
  var b64=btoa(unescape(encodeURIComponent(str)));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64urlDecode(str){
  var b64=str.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4)b64+='=';
  return decodeURIComponent(escape(atob(b64)));
}
function buildShareURL(){
  var keys=Object.keys(stars());
  if(!keys.length)return null;
  var enc=b64urlEncode(JSON.stringify(keys));
  var base=location.href.split('#')[0];
  return base+'#stars='+enc;
}

async function shareStarredLink(){
  var url=buildShareURL();
  if(!url){alert('You have not starred anything yet.\nTap the ★ next to talks, posters or sessions first.');return;}
  var n=Object.keys(stars()).length;
  if(navigator.share){
    try{await navigator.share({title:'FENS 2026 — My starred program',
      text:'My FENS 2026 starred program ('+n+' items) — open to add them to yours:',url:url});return;}
    catch(e){if(e&&e.name==='AbortError')return;/* else fall through */}
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    try{await navigator.clipboard.writeText(url);alert('Share link copied to clipboard.');return;}
    catch(e){/* fall through */}
  }
  showShareFallback(url);
}

// If the page was opened with a #stars=... hash, offer to merge those stars.
function importStarsFromHash(){
  var m=(location.hash||'').match(/[#&]stars=([^&]+)/);
  if(!m)return;
  var keys;
  try{keys=JSON.parse(b64urlDecode(m[1]));}catch(e){keys=null;}
  // Clear the hash regardless so a refresh doesn't re-prompt.
  try{history.replaceState(null,'',location.pathname+location.search);}
  catch(e){location.hash='';}
  if(!keys||!keys.length||!Array.isArray(keys))return;
  var existing=stars();
  var incoming=[];
  for(var i=0;i<keys.length;i++){
    if(typeof keys[i]==='string' && !existing[keys[i]])incoming.push(keys[i]);
  }
  if(!incoming.length)return; // nothing new to add
  showImportDialog(keys.length,incoming);
}

function showImportDialog(total,incoming){
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;'
    +'display:flex;align-items:center;justify-content:center;padding:16px;';
  var box=document.createElement('div');
  box.style.cssText='background:var(--surface);color:var(--text);border-radius:12px;'
    +'padding:20px;max-width:420px;width:100%;display:flex;flex-direction:column;gap:14px;';
  var msg=document.createElement('div');
  var already=total-incoming.length;
  msg.innerHTML='<div style="font-size:1.05rem;font-weight:700;margin-bottom:6px">Add shared stars?</div>'
    +'<div style="font-size:0.9rem;color:var(--text-muted)">Someone shared a program with '
    +total+' starred item'+(total===1?'':'s')+'. '
    +'<b style="color:var(--text)">'+incoming.length+' new</b> will be added to your saved stars'
    +(already?' ('+already+' you already have).':'.')+'</div>';
  var row=document.createElement('div');
  row.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
  var cancel=document.createElement('button');
  cancel.textContent='Not now';cancel.className='share-btn';
  cancel.onclick=function(){document.body.removeChild(wrap);};
  var add=document.createElement('button');
  add.textContent='Add '+incoming.length+' star'+(incoming.length===1?'':'s');
  add.className='share-btn';
  add.style.cssText='background:var(--accent);color:#fff;border-color:var(--accent);';
  add.onclick=function(){
    var s=stars();
    for(var i=0;i<incoming.length;i++)s[incoming[i]]=true;
    saveStars(s);
    document.body.removeChild(wrap);
    render();
  };
  row.appendChild(cancel);row.appendChild(add);
  box.appendChild(msg);box.appendChild(row);wrap.appendChild(box);
  wrap.onclick=function(e){if(e.target===wrap)document.body.removeChild(wrap);};
  document.body.appendChild(wrap);
}

function switchDay(idx){
  curDay=idx;
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle('active',i===idx);
  // In global mode all days are already on screen — just scroll to the heading.
  var globalMode=!!document.getElementById('search').value.trim()
    ||document.getElementById('starFilter').classList.contains('active');
  if(globalMode){
    var el=document.getElementById('day-'+idx);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});return;}
  }
  render();
  window.scrollTo(0,0);
}

function toggleBackToTop(){
  var b=document.getElementById('toTop');
  if(b)b.classList.toggle('show',window.scrollY>500);
}

// Load the program with offline resilience: serve from network when available
// (and refresh the cache), fall back to the cached copy when the venue wifi drops.
async function loadProgram(){
  var url='program.json';
  var hasCache=('caches' in window);
  try{
    var resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    if(hasCache){try{var c=await caches.open('fens2026');await c.put(url,resp.clone());}catch(e){}}
    return await resp.json();
  }catch(err){
    if(hasCache){
      try{
        var c=await caches.open('fens2026');
        var cached=await c.match(url);
        if(cached){
          var el=document.getElementById('subtitle');
          if(el)el.textContent='Offline — showing saved program';
          return await cached.json();
        }
      }catch(e){}
    }
    throw err;
  }
}

async function init(){
  try{
    data=await loadProgram();
    // Open on today's tab during the conference; otherwise the first day.
    var tl=todayLabel(), startDay=0;
    for(var i=0;i<data.days.length;i++){if(data.days[i].date===tl){startDay=i;break;}}
    curDay=startDay;
    var tabsEl=document.getElementById('tabs');
    for(var i=0;i<data.days.length;i++){
      var tab=document.createElement('div');
      tab.className='tab'+(i===startDay?' active':'')+(data.days[i].date===tl?' today':'');
      tab.textContent=data.days[i].day;
      tab.onclick=(function(idx){return function(){switchDay(idx);};})(i);
      tabsEl.appendChild(tab);
    }
    var st;
    document.getElementById('search').addEventListener('input',function(){
      clearTimeout(st);st=setTimeout(render,150);
    });
    document.getElementById('starFilter').addEventListener('click',function(){
      this.classList.toggle('active');render();window.scrollTo(0,0);
    });
    document.getElementById('shareBtn').addEventListener('click',shareStarred);
    document.getElementById('shareLinkBtn').addEventListener('click',shareStarredLink);
    document.getElementById('toTop').addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
    window.addEventListener('scroll',toggleBackToTop,{passive:true});
    render();
    importStarsFromHash();
  }catch(e){
    document.getElementById('subtitle').textContent='Error loading program';
    document.getElementById('content').innerHTML='<div class="loading">Failed to load program.json.<br><small>'+e.message+'</small></div>';
  }
}
init();

// Register the service worker for offline use (secure contexts only; no-op on
// plain http or unsupported browsers).
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
